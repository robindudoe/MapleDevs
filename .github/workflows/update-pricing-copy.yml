name: Update pricing copy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-pricing-copy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch pricing copy
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace('$29 CAD', '$49 CAD')

          s = re.sub(
              r'<p>Featured jobs \(<b>\$49 CAD</b>\) stay at the top, get 5x more clicks, and help fund this community\.</p>\s*<p>Payment via Interac e-Transfer: <b>wupeiheng11@gmail\.com</b></p>',
              '<p>Featured jobs (<b>$49 CAD</b>) stay at the top, get 5x more clicks, and help fund this community.</p>\n        <p>Hiring Boost placements are <b>$149 CAD</b> and include homepage, newsletter, and community visibility.</p>\n        <p>Payment via Interac e-Transfer: <b>wupeiheng11@gmail.com</b></p>',
              s,
          )

          s = re.sub(
              r'<p style="font-size:0\.9rem; margin-top:1rem; color:var\(--text-3\)">Standard listings are <b>Free</b>\. <br>Featured listings are <b>\$49 CAD</b> \(payable via Interac e-Transfer to <b>wupeiheng11@gmail\.com</b>\)\.</p>',
              '<p style="font-size:0.9rem; margin-top:1rem; color:var(--text-3)">Standard listings are <b>Free</b>. <br>Featured listings are <b>$49 CAD</b>. Hiring Boost placements are <b>$149 CAD</b> and include extra homepage, newsletter, and community visibility. Payments are payable via Interac e-Transfer to <b>wupeiheng11@gmail.com</b>.</p>',
              s,
          )

          s = re.sub(
              r'<p>Standard job listings are currently free\. <strong>Featured Listings</strong> are available for <strong>\$49 CAD</strong>\. Featured roles stay at the top of the board, receive priority in our newsletter, and are highlighted on social media\.</p>\s*<p>Payments must be sent via Interac e-Transfer to <strong>wupeiheng11@gmail\.com</strong>\.',
              '<p>Standard job listings are currently free. <strong>Featured Listings</strong> are available for <strong>$49 CAD</strong>. <strong>Hiring Boost</strong> placements are available for <strong>$149 CAD</strong>. Featured roles stay at the top of the board, receive priority in our newsletter, and can be highlighted on social media or community channels.\n  Payments must be sent via Interac e-Transfer to <strong>wupeiheng11@gmail.com</strong>.',
              s,
          )

          if '$29 CAD' in s or '$29' in s:
              raise SystemExit('Old $29 pricing still present')
          for needle in ['$49 CAD', '$149 CAD', 'Hiring Boost placements']:
              if needle not in s:
                  raise SystemExit(f'Missing expected copy: {needle}')

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched source and remove workflow
        run: |
          rm .github/workflows/update-pricing-copy.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-pricing-copy.yml
          git commit -m "Update MapleDevs pricing copy"
          git push
