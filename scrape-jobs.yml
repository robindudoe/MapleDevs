# MapleDevs — Automated Job Scraper
# Runs daily to scrape Canadian game studio career pages and update your Google Sheet.
# Jobs that are removed from studio websites are automatically removed from your sheet.

name: Scrape Canadian Game Studio Jobs

on:
  # Run every day at 8:00 AM UTC (3:00 AM EST / 12:00 AM PST)
  schedule:
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🍁 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📥 Install dependencies
        run: |
          cd scripts
          npm install googleapis google-auth-library slugify axios

      - name: 🔍 Scrape & Build & Index
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          cd scripts
          echo "🚀 Step 1: Scraping Jobs..."
          node scrape-jobs.js
          echo "📂 Step 2: Building SEO Pages..."
          node build-seo.js
          echo "🔍 Step 3: Pinging Google Indexing API..."
          node google-index.js
          echo "📣 Step 4: Announcing on LinkedIn..."
          node post-linkedin.js


      - name: 🚀 Commit and Push changes
        run: |
          git config --global user.name "MapleDevs Automation"
          git config --global user.email "mapledevsbusiness@gmail.com"
          git add .
          git commit -m "🤖 Auto-update: Scraped jobs and rebuilt SEO pages [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main


